<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .in-box {
            width: 70px;
            height: 70px;
        }
        .in {
            background: violet;
        }

        .in2 {
            background: rgb(243, 235, 10);
        }

        .in3 {
            background: #b81d41;
        }

        .in4 {
            background: #33aacb;
        }
        
        .out {
            background-color: #0011ab;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: space-between;
            flex-direction: column;
            padding: 20px;
        }

        .black {
            background: black;
            padding: 20px;
            width: 300px;
            height: 300px;

        }
    </style>
</head>
<body>
    <div class="out">
        <div class="black">
            <div class="in in-box"></div>
            <div class="in2 in-box"></div>
            <div class="in3 in-box"></div>
            <div class="in4 in-box"></div>
        </div>
    </div>
</body>
</html>
